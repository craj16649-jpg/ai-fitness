<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | AI Fitness</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input, select, button {
            width: 100%;
            padding: 10px 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form method="POST">

        <!-- Name -->
        <input type="text" name="name" placeholder="Name" required>

        <!-- Age -->
        <input type="number" name="age" placeholder="Age" min="10" max="100" required>

        <!-- Gender -->
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <!-- Fitness Goal -->
        <input type="text" name="goal" placeholder="Fitness Goal" required>

        <!-- Username -->
        <input type="text" name="username" placeholder="Username" required>

        <!-- Password -->
        <input type="password" name="password" placeholder="Password" required>

        <!-- Weight -->
        <input type="number" name="weight" placeholder="Weight in kg" step="0.1" min="20" max="300" required>

        <!-- Height -->
        <input type="number" name="height" placeholder="Height in meters (example: 1.75)" step="0.01" min="0.5" max="2.5" required>

        <button type="submit">Register</button>

    </form>

    <a href="/">Already have an account? Login</a>
</div>

</body>
</html>
